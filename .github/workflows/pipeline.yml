# .github/workflows/pipeline.yml
#
# Blockchain-based CI/CD Integrity System — Main Workflow
#
# Updated to use Node.js 24 compatible action versions.

name: CI/CD Integrity Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NETWORK: "sepolia"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ═════════════════════════════════════════════════════════════════════════════
# JOB 1 — BUILD & TEST
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      SEPOLIA_RPC_URL:           ${{ secrets.SEPOLIA_RPC_URL }}
      BOT_PRIVATE_KEY:           ${{ secrets.BOT_PRIVATE_KEY }}
      PIPELINE_REGISTRY_ADDRESS: ${{ secrets.PIPELINE_REGISTRY_ADDRESS }}
      EVENT_LOGGER_ADDRESS:      ${{ secrets.EVENT_LOGGER_ADDRESS }}
      VERIFIER_ADDRESS:          ${{ secrets.VERIFIER_ADDRESS }}
      PIPELINE_ID:               ${{ secrets.PIPELINE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: "[Blockchain] Log — pipeline triggered"
        run: |
          node logger/blockchain-logger.js log \
            0 \
            ${{ github.run_id }} \
            ${{ github.sha }} \
            ${{ github.actor }} \
            "Pipeline triggered by push to ${{ github.ref_name }}"

      - name: Compile contracts
        run: npm run compile

      - name: "[Blockchain] Log — build started"
        run: |
          node logger/blockchain-logger.js log \
            1 \
            ${{ github.run_id }} \
            ${{ github.sha }} \
            ${{ github.actor }} \
            "Solidity contracts compiled successfully"

      - name: Run contract tests
        id: run-tests
        run: npm test

      - name: "[Blockchain] Log — tests passed"
        if: success()
        run: |
          node logger/blockchain-logger.js log \
            5 \
            ${{ github.run_id }} \
            ${{ github.sha }} \
            ${{ github.actor }} \
            "All contract unit tests passed"

      - name: "[Blockchain] Log — tests failed"
        if: failure()
        run: |
          node logger/blockchain-logger.js log \
            6 \
            ${{ github.run_id }} \
            ${{ github.sha }} \
            ${{ github.actor }} \
            "Test suite failed — deployment will not proceed"

      - name: Upload gas report
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: gas-report
          path: gas-report.txt
          if-no-files-found: ignore

# ═════════════════════════════════════════════════════════════════════════════
# JOB 2 — INTEGRITY VERIFICATION
# ═════════════════════════════════════════════════════════════════════════════
  verify-integrity:
    name: Verify Pipeline Integrity
    runs-on: ubuntu-latest
    needs: build-and-test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      SEPOLIA_RPC_URL:           ${{ secrets.SEPOLIA_RPC_URL }}
      BOT_PRIVATE_KEY:           ${{ secrets.BOT_PRIVATE_KEY }}
      PIPELINE_REGISTRY_ADDRESS: ${{ secrets.PIPELINE_REGISTRY_ADDRESS }}
      EVENT_LOGGER_ADDRESS:      ${{ secrets.EVENT_LOGGER_ADDRESS }}
      VERIFIER_ADDRESS:          ${{ secrets.VERIFIER_ADDRESS }}
      PIPELINE_ID:               ${{ secrets.PIPELINE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts (for ABIs)
        run: npm run compile

      - name: "[Blockchain] Verify pipeline integrity"
        id: integrity-check
        run: |
          node logger/blockchain-logger.js verify \
            ${{ github.run_id }} \
            ${{ github.sha }} \
            ${{ github.actor }}

      - name: Integrity check passed
        if: success()
        run: |
          echo "✅ Pipeline integrity verified on-chain."
          echo "   Proceeding to deployment."

      - name: Integrity check FAILED — tamper detected
        if: failure()
        run: |
          echo "❌ INTEGRITY FAILURE — TAMPER DETECTED"
          echo "   Deployment is BLOCKED."

# ═════════════════════════════════════════════════════════════════════════════
# JOB 3 — DEPLOY
# ═════════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-and-test, verify-integrity]

    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.verify-integrity.result == 'success'

    env:
      SEPOLIA_RPC_URL:           ${{ secrets.SEPOLIA_RPC_URL }}
      BOT_PRIVATE_KEY:           ${{ secrets.BOT_PRIVATE_KEY }}
      PIPELINE_REGISTRY_ADDRESS: ${{ secrets.PIPELINE_REGISTRY_ADDRESS }}
      EVENT_LOGGER_ADDRESS:      ${{ secrets.EVENT_LOGGER_ADDRESS }}
      VERIFIER_ADDRESS:          ${{ secrets.VERIFIER_ADDRESS }}
      PIPELINE_ID:               ${{ secrets.PIPELINE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts (for ABIs)
        run: npm run compile

      - name: "[Blockchain] Log — deploy started"
        run: |
          node logger/blockchain-logger.js log \
            9 \
            ${{ github.run_id }} \
            ${{ github.sha }} \
            ${{ github.actor }} \
            "Deploying to Sepolia testnet"

      - name: Deploy application
        id: deploy
        run: |
          echo "🚀 Running deployment..."
          echo "Deployment complete."

      - name: "[Blockchain] Log — deploy success"
        if: success()
        run: |
          node logger/blockchain-logger.js log \
            10 \
            ${{ github.run_id }} \
            ${{ github.sha }} \
            ${{ github.actor }} \
            "Deployment to Sepolia completed successfully"

      - name: "[Blockchain] Log — deploy failed"
        if: failure()
        run: |
          node logger/blockchain-logger.js log \
            11 \
            ${{ github.run_id }} \
            ${{ github.sha }} \
            ${{ github.actor }} \
            "Deployment failed — check GitHub Actions logs"
